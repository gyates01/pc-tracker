<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="description" content="Track PC build components, compare current and target prices, and monitor your build progress." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pc-tracker-orpin.vercel.app" />
    <meta property="og:title" content="PC Build Parts Tracker" />
    <meta property="og:description" content="Track PC build components, compare current and target prices, and monitor your build progress." />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="PC Build Parts Tracker" />
    <meta name="twitter:description" content="Track PC build components, compare current and target prices, and monitor your build progress." />
    <title>PC Parts Tracker</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --primary:        #60a5fa;
            --primary-dark:   #3b82f6;
            --primary-light:  rgba(96, 165, 250, 0.1);
            --primary-border: rgba(96, 165, 250, 0.2);
            --accent:         #4ade80;
            --accent-dark:    #22c55e;
            --accent-light:   rgba(74, 222, 128, 0.1);
            --accent-border:  rgba(74, 222, 128, 0.2);
            --warning:        #fb923c;
            --danger:         #f87171;
            --danger-dark:    #ef4444;
            --bg:             #111111;
            --surface:        #1c1c1c;
            --surface-2:      #242424;
            --border:         #2e2e2e;
            --border-hover:   #3e3e3e;
            --text:           #f5f5f5;
            --text-muted:     #a0a0a0;
            --text-light:     #666666;
            --shadow-sm:      0 1px 3px rgba(0,0,0,0.5);
            --shadow:         0 2px 6px rgba(0,0,0,0.5);
            --shadow-md:      0 4px 12px rgba(0,0,0,0.6);
            --shadow-lg:      0 8px 24px rgba(0,0,0,0.7);
            --radius:         14px;
            --radius-sm:      10px;
            --radius-xs:      7px;
            --transition:     all 0.2s ease;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── HEADER ─────────────────────────────────────── */
        .site-header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .header-accent {
            height: 3px;
            background: linear-gradient(90deg, var(--primary) 0%, #7c3aed 50%, var(--accent) 100%);
        }

        .header-inner {
            max-width: 1240px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            height: 60px;
        }

        .back-link {
            font-size: 13px;
            color: var(--text-muted);
            text-decoration: none;
            padding: 6px 12px;
            border-radius: var(--radius-xs);
            background: var(--surface-2);
            border: 1px solid var(--border);
            transition: var(--transition);
            white-space: nowrap;
            flex-shrink: 0;
        }
        .back-link:hover {
            color: var(--primary);
            border-color: var(--primary-border);
            background: var(--primary-light);
        }

        .header-title { flex: 1; min-width: 0; }
        .header-title h1 {
            font-size: 20px;
            font-weight: 800;
            color: var(--text);
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: -0.3px;
        }
        .header-title p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .header-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

        /* ── BUTTONS ─────────────────────────────────────── */
        .btn {
            padding: 7px 14px;
            border-radius: var(--radius-xs);
            font-size: 13px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: inherit;
        }
        .btn-primary { background: #ffffff; color: #111111; font-weight: 700; }
        .btn-primary:hover { background: #e5e5e5; }

        .btn-secondary {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover { border-color: var(--border-hover); background: var(--surface-2); }

        .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid transparent; }
        .btn-ghost:hover { background: var(--surface-2); border-color: var(--border); color: var(--text); }

        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: var(--danger-dark); }

        .btn-sm { padding: 5px 11px; font-size: 12px; }
        .btn-xs { padding: 3px 9px; font-size: 11px; }

        /* ── MAIN LAYOUT ─────────────────────────────────── */
        .main {
            max-width: 1240px;
            margin: 0 auto;
            padding: 24px;
        }

        /* ── SYNC PANEL ──────────────────────────────────── */
        .sync-panel {
            background: var(--surface);
            border: 1px solid var(--primary-border);
            border-radius: var(--radius-sm);
            padding: 16px 20px;
            margin-bottom: 20px;
            display: none;
        }
        .sync-panel.open { display: block; }
        .sync-panel-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 6px;
        }
        .sync-panel p {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 12px;
            line-height: 1.5;
        }
        .sync-actions { display: flex; gap: 8px; flex-wrap: wrap; }

        /* ── STATS BAR ───────────────────────────────────── */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-top: 3px solid var(--card-accent, var(--primary));
            border-radius: var(--radius-sm);
            padding: 18px 20px;
            box-shadow: var(--shadow);
            transition: var(--transition);
            cursor: default;
        }
        .stat-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-3px);
            border-color: var(--border-hover);
            border-top-color: var(--card-accent, var(--primary));
        }
        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 8px;
        }
        .stat-value {
            font-size: 26px;
            font-weight: 700;
            color: var(--card-accent, var(--primary));
            line-height: 1;
        }
        .stat-value.savings { color: var(--card-accent, var(--accent)); }

        /* ── BUILDS GRID ─────────────────────────────────── */
        .builds-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* ── SECTION CARD ────────────────────────────────── */
        .section-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-top: 3px solid var(--card-accent, var(--primary));
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            transition: var(--transition);
            overflow: hidden;
        }
        .section-card:hover {
            box-shadow: var(--shadow-lg);
            border-color: var(--border-hover);
            border-top-color: var(--card-accent, var(--primary));
            transform: translateY(-3px);
        }
        .section-full { grid-column: 1 / -1; }

        .section-header {
            padding: 18px 22px 15px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-badge {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 9px;
            background: var(--surface-2);
            color: var(--text-muted);
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .section-body { padding: 18px 22px; }

        /* ── PART ITEMS ──────────────────────────────────── */
        .part-item {
            padding: 12px 14px;
            margin-bottom: 8px;
            background: var(--surface-2);
            border-radius: var(--radius-xs);
            border: 1px solid var(--border);
            border-left: 3px solid transparent;
            transition: var(--transition);
        }
        .part-item:last-child { margin-bottom: 0; }

        .part-item:hover {
            border-color: var(--border-hover);
            border-left-color: var(--card-accent, var(--primary));
            background: var(--surface-2);
            box-shadow: var(--shadow-sm);
        }
        .part-item.purchased {
            border-left-color: var(--accent-dark);
            background: rgba(74, 222, 128, 0.06);
            border-color: rgba(74, 222, 128, 0.18);
        }
        .part-item.purchased:hover { box-shadow: var(--shadow-sm); }

        .part-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        /* ── INPUTS ──────────────────────────────────────── */
        input[type="text"], input[type="number"] {
            border: 1px solid var(--border);
            border-radius: var(--radius-xs);
            padding: 6px 10px;
            font-size: 13px;
            width: 100%;
            background: var(--bg);
            color: var(--text);
            transition: border-color 0.15s, box-shadow 0.15s;
            font-family: inherit;
        }
        input[type="text"]:focus, input[type="number"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(96,165,250,0.15);
        }

        .part-name-input {
            font-weight: 600;
            font-size: 14px;
            border: none !important;
            background: transparent !important;
            padding: 0 !important;
            box-shadow: none !important;
            width: auto;
            min-width: 80px;
            color: var(--text);
        }
        .part-name-input:focus { border-bottom: 1px solid var(--primary) !important; }

        .field-label {
            display: block;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 3px;
        }
        .price-inputs { display: flex; gap: 8px; margin-top: 8px; }
        .price-group { flex: 1; }
        .url-field { margin-top: 8px; }

        /* ── PURCHASED TOGGLE ────────────────────────────── */
        .purchased-toggle {
            background: transparent;
            color: var(--text-muted);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
            flex-shrink: 0;
            font-family: inherit;
        }
        .purchased-toggle:hover { border-color: var(--accent-dark); color: var(--accent); }
        .purchased-toggle.active { background: var(--accent-dark); color: #111; border-color: var(--accent-dark); font-weight: 700; }

        /* ── VIEW MODE ───────────────────────────────────── */
        .part-view-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 14px;
        }
        .part-view-info { flex: 1; min-width: 0; }
        .part-view-name {
            font-weight: 600;
            font-size: 14px;
            color: var(--text);
            margin-bottom: 3px;
        }
        .part-view-details { font-size: 13px; color: var(--text-muted); margin-bottom: 4px; }
        .part-view-link {
            font-size: 12px;
            color: var(--primary);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }
        .part-view-link:hover { text-decoration: underline; }

        .part-view-price { text-align: right; flex-shrink: 0; }
        .price-current { font-size: 18px; font-weight: 700; color: var(--accent-dark); display: block; }
        .price-tbd { font-size: 14px; color: var(--warning); font-style: italic; display: block; }
        .price-original { font-size: 12px; color: var(--text-light); text-decoration: line-through; display: block; margin-top: 2px; }

        .purchased-badge {
            display: inline-block;
            background: var(--accent);
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
            letter-spacing: 0.5px;
            margin-top: 6px;
        }

        .empty-state {
            font-size: 13px;
            color: var(--text-light);
            font-style: italic;
            padding: 8px 0;
        }

        /* ── FOOTER ──────────────────────────────────────── */
        .page-footer {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            flex-wrap: wrap;
        }

        /* ── TOAST ───────────────────────────────────────── */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--text);
            color: white;
            padding: 10px 18px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.25s ease, transform 0.25s ease;
            z-index: 1000;
            pointer-events: none;
            max-width: 320px;
        }
        .toast.show { opacity: 1; transform: translateY(0); }

        /* ── MODE INDICATOR ──────────────────────────────── */
        .mode-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }
        .mode-pill {
            font-size: 12px;
            color: var(--text-muted);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 14px;
        }

        /* ── CONNECTION DOT ─────────────────────────────── */
        .conn-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-light);
            display: inline-block;
            flex-shrink: 0;
            transition: background 0.4s ease;
        }
        .conn-dot.online  { background: var(--accent); box-shadow: 0 0 0 2px var(--accent-light); }
        .conn-dot.offline { background: var(--warning); }
        .conn-dot.disabled { background: var(--text-light); }

        /* ── SYNC PANEL VARIANTS ─────────────────────────── */
        .sync-panel.firebase-live {
            border-color: var(--accent-border);
            background: var(--accent-light);
        }
        .sync-panel.firebase-live .sync-panel-title { color: var(--accent-dark); }
        .sync-note {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 10px;
            line-height: 1.5;
        }
        .sync-code {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-xs);
            padding: 10px 14px;
            margin: 10px 0;
            white-space: pre-wrap;
            word-break: break-all;
            color: var(--accent);
            line-height: 1.6;
        }

        /* ── SECTION PROGRESS BAR ───────────────────────── */
        .section-progress {
            height: 3px;
            background: var(--border);
            overflow: hidden;
        }
        .section-progress-fill {
            height: 100%;
            background: var(--card-accent, var(--primary));
            transition: width 0.6s ease;
        }
        .section-card.complete { border-top-color: var(--accent-dark) !important; }
        .section-card.complete .section-header { background: rgba(74,222,128,0.04); }

        /* ── PRICE COLORS ────────────────────────────────── */
        .price-deal { color: var(--accent) !important; }
        .price-savings-badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            color: var(--accent-dark);
            background: var(--accent-light);
            border-radius: 20px;
            padding: 1px 7px;
            margin-top: 4px;
        }

        /* ── NEXT BUY STAR ───────────────────────────────── */
        .next-buy-star {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 15px;
            line-height: 1;
            padding: 0 2px;
            opacity: 0.25;
            transition: opacity 0.2s, transform 0.15s;
            flex-shrink: 0;
        }
        .next-buy-star:hover { opacity: 0.6; transform: scale(1.2); }
        .next-buy-star.active { opacity: 1; }
        .next-buy-badge {
            font-size: 10px;
            font-weight: 700;
            color: #fbbf24;
            background: rgba(251,191,36,0.12);
            border-radius: 20px;
            padding: 1px 7px;
            letter-spacing: 0.3px;
        }

        /* ── NOTES ───────────────────────────────────────── */
        .notes-toggle {
            font-size: 11px;
            color: var(--text-light);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            margin-top: 8px;
            font-family: inherit;
            transition: color 0.15s;
            display: block;
        }
        .notes-toggle:hover { color: var(--text-muted); }
        .notes-area { margin-top: 6px; display: none; }
        .notes-area.open { display: block; }
        .notes-area textarea {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-xs);
            color: var(--text);
            font-family: inherit;
            font-size: 12px;
            padding: 8px 10px;
            resize: vertical;
            min-height: 56px;
            transition: border-color 0.15s;
            box-sizing: border-box;
        }
        .notes-area textarea:focus { outline: none; border-color: var(--primary); }
        .notes-view {
            margin-top: 5px;
            font-size: 12px;
            color: var(--text-muted);
            font-style: italic;
            padding: 5px 9px;
            background: var(--surface-2);
            border-radius: var(--radius-xs);
            border-left: 2px solid var(--border);
        }

        /* ── PRICE HISTORY ───────────────────────────────── */
        .history-toggle {
            font-size: 11px;
            color: var(--text-light);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            margin-top: 4px;
            font-family: inherit;
            transition: color 0.15s;
            display: block;
        }
        .history-toggle:hover { color: var(--text-muted); }
        .price-history { margin-top: 6px; display: none; }
        .price-history.open { display: block; }
        .price-history-entry {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-light);
            padding: 3px 0;
            border-bottom: 1px solid var(--border);
        }
        .price-history-entry:last-child { border-bottom: none; }

        /* ── BUDGET ROW ──────────────────────────────────── */
        .budget-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .budget-label { font-size: 13px; color: var(--text-muted); }
        .budget-input-wrap {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            color: var(--text-muted);
        }
        .budget-input-wrap input {
            width: 85px;
            padding: 5px 8px;
            font-size: 13px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-xs);
            color: var(--text);
            font-family: inherit;
        }
        .budget-input-wrap input:focus { outline: none; border-color: var(--primary); }
        .budget-estimate {
            font-size: 13px;
            color: var(--text-muted);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 14px;
            transition: var(--transition);
        }
        .budget-estimate.active { color: var(--primary); border-color: var(--primary-border); }

        /* ── COUNTER ANIM ────────────────────────────────── */
        @keyframes pop { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
        .stat-pop { animation: pop 0.35s ease; }

        /* ── SHARE VIEW ──────────────────────────────────── */
        .share-banner {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px 18px;
            margin-bottom: 20px;
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
        }

        /* ── RESPONSIVE ──────────────────────────────────── */
        @media (max-width: 900px) {
            .builds-grid { grid-template-columns: 1fr; }
            .section-full { grid-column: 1; }
        }

        @media (max-width: 640px) {
            .header-inner { padding: 0 16px; }
            .header-title p { display: none; }
            .main { padding: 16px; }
            .stats-bar { grid-template-columns: 1fr 1fr; gap: 12px; }
            .stat-value { font-size: 22px; }
        }

        @media (max-width: 400px) {
            .header-actions .btn-secondary { display: none; }
        }
    </style>
</head>
<body>

<header class="site-header">
    <div class="header-accent"></div>
    <div class="header-inner">
        <a href="https://hub-phi-blush.vercel.app" class="back-link">← hub</a>
        <div class="header-title">
            <h1>🖥️ PC Build Tracker</h1>
            <p>Track components, compare prices, monitor progress</p>
        </div>
        <div class="header-actions">
            <button id="modeToggle" class="btn btn-secondary btn-sm" onclick="toggleMode()">View Mode</button>
            <button class="btn btn-ghost btn-sm" onclick="toggleSync()" id="syncBtn" title="Sync settings">
                <span class="conn-dot disabled" id="connDot"></span>
                Sync
            </button>
        </div>
    </div>
</header>

<main class="main">

    <!-- Sync Panel — content is set dynamically by renderSyncPanel() -->
    <div class="sync-panel" id="syncPanel"></div>

    <!-- Stats -->
    <div class="stats-bar">
        <div class="stat-card" style="--card-accent: #60a5fa">
            <div class="stat-label">Purchased</div>
            <div class="stat-value" id="itemsCount">0/0</div>
        </div>
        <div class="stat-card" style="--card-accent: #4ade80">
            <div class="stat-label">Already Spent</div>
            <div class="stat-value" id="totalSpent">$0</div>
        </div>
        <div class="stat-card" style="--card-accent: #fb923c">
            <div class="stat-label">Remaining (Est.)</div>
            <div class="stat-value" id="totalRemaining">$0</div>
        </div>
        <div class="stat-card" style="--card-accent: #c084fc">
            <div class="stat-label">Total Savings</div>
            <div class="stat-value savings" id="totalSavings">$0</div>
        </div>
    </div>

    <!-- Share mode banner (hidden unless ?share=1) -->
    <div class="share-banner" id="shareBanner" style="display:none">
        👁 Read-only view — <a href="javascript:void(0)" onclick="document.getElementById('shareBanner').style.display='none';isShareMode=false;renderParts();" style="color:var(--primary)">switch to edit mode</a>
    </div>

    <!-- Mode pill -->
    <div class="mode-bar">
        <span class="mode-pill" id="modePill">✏️ Edit Mode — click fields to edit, changes auto-save</span>
    </div>

    <!-- Budget row -->
    <div class="budget-row">
        <span class="budget-label">Monthly budget</span>
        <span class="budget-input-wrap">$<input type="number" id="monthlyBudgetInput" placeholder="e.g. 200" min="1" oninput="updateMonthlyBudget(this.value)"></span>
        <span class="budget-estimate" id="budgetEstimate">Set a budget to see estimated completion</span>
    </div>

    <!-- Parts grid -->
    <div class="builds-grid" id="partsContainer"></div>

    <div class="page-footer">
        <button class="btn btn-danger btn-sm" onclick="resetToDefaults()">Reset to Defaults</button>
    </div>

</main>

<div class="toast" id="toast"></div>
<input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImportFile(event)">

<script>
    // ══════════════════════════════════════════════════════
    //  FIREBASE CONFIG
    // ══════════════════════════════════════════════════════
    const FIREBASE_CONFIG = {
        apiKey:            "AIzaSyCecV5p1pZJsZCU6jV1DDocyzEz5LM28p0",
        authDomain:        "pc-tracker-20360.firebaseapp.com",
        databaseURL:       "https://pc-tracker-20360-default-rtdb.firebaseio.com",
        projectId:         "pc-tracker-20360",
        storageBucket:     "pc-tracker-20360.firebasestorage.app",
        messagingSenderId: "440236448073",
        appId:             "1:440236448073:web:360783b3228ddc7411a298"
    };

    const FIREBASE_ENABLED = !!(FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.databaseURL);
    let   dataRef     = null;
    let   pendingRender = false;
    let   writeTimer    = null;

    if (FIREBASE_ENABLED) {
        firebase.initializeApp(FIREBASE_CONFIG);
        const db = firebase.database();
        dataRef  = db.ref('pcTracker/data');

        dataRef.on('value', snapshot => {
            const val = snapshot.val();
            if (!val) {
                const local = localStorage.getItem('pcPartsData');
                if (local) dataRef.set(JSON.parse(local));
                return;
            }
            localStorage.setItem('pcPartsData', JSON.stringify(val));
            if (document.activeElement && document.activeElement.tagName === 'INPUT') {
                pendingRender = true;
            } else {
                renderParts();
            }
        });

        document.addEventListener('blur', () => {
            if (pendingRender) { pendingRender = false; renderParts(); }
        }, true);

        db.ref('.info/connected').on('value', snap => {
            setConnected(snap.val() === true);
        });
    }

    function setConnected(online) {
        const dot = document.getElementById('connDot');
        if (!dot) return;
        dot.className = 'conn-dot ' + (FIREBASE_ENABLED ? (online ? 'online' : 'offline') : 'disabled');
        dot.title = FIREBASE_ENABLED
            ? (online ? 'Live sync active — all devices in sync' : 'Reconnecting…')
            : 'Firebase not configured';
        renderSyncPanel();
    }

    function writeToFirebase(data) {
        if (!FIREBASE_ENABLED || !dataRef) return;
        clearTimeout(writeTimer);
        writeTimer = setTimeout(() => {
            dataRef.set(data).catch(() => showToast('⚠️ Cloud save failed — saved locally'));
        }, 400);
    }

    let isViewMode  = false;
    let isShareMode = false;

    // Detect read-only share mode via ?share=1 URL param
    if (new URLSearchParams(location.search).get('share') === '1') {
        isShareMode = true;
        isViewMode  = true;
    }

    // ── DEFAULT DATA ────────────────────────────────────
    const defaultData = {
        currentPC: [
            { name: 'CPU',        details: 'Ryzen 7 5700X',       price: 162,          originalPrice: null, purchased: false, url: '', notes: '', nextBuy: false, priceHistory: [] },
            { name: 'AIO Cooler', details: 'DI COOLING DX240',    price: 43,           originalPrice: 80,   purchased: true,  url: '', notes: '', nextBuy: false, priceHistory: [] },
            { name: 'RAM',        details: '2x8GB DDR4 3200MHz',  price: '30-50',      originalPrice: null, purchased: false, url: '', notes: '', nextBuy: false, priceHistory: [] }
        ],
        newPC: [
            { name: 'CPU',         details: 'Ryzen 5 9600X',                                   price: 180,           originalPrice: 280,  purchased: false, url: '', notes: '', nextBuy: false, priceHistory: [] },
            { name: 'Motherboard', details: 'MSI PRO B650-A WiFi',                             price: 135,           originalPrice: 210,  purchased: true,  url: '', notes: '', nextBuy: false, priceHistory: [] },
            { name: 'AIO Cooler',  details: 'DARKROCK D360',                                   price: 50,            originalPrice: null, purchased: true,  url: '', notes: '', nextBuy: false, priceHistory: [] },
            { name: 'RAM',         details: '2x16GB DDR5 6000MHz (G.Skill Flare X5)',          price: '75-90',       originalPrice: null, purchased: false, url: '', notes: '', nextBuy: false, priceHistory: [] },
            { name: 'GPU',         details: 'RX 9070 16GB | stretch: 9070 XT ~$649',          price: '499-549',     originalPrice: null, purchased: false, url: '', notes: '', nextBuy: false, priceHistory: [] },
            { name: 'PSU',         details: '650W Modular (Corsair RM650x)',                   price: '100-130',     originalPrice: null, purchased: false, url: '', notes: '', nextBuy: false, priceHistory: [] },
            { name: 'Storage',     details: '2TB NVMe x2 (⚠️ SSD shortage — prices up ~2x)', price: '300-500 ea',  originalPrice: null, purchased: false, url: '', notes: '', nextBuy: false, priceHistory: [] }
        ],
        peripherals: []
    };

    const LATEST_PRICES = {
        currentPC: { 'RAM': { price: '30-50' } },
        newPC: {
            'CPU':         { price: 180 },
            'Motherboard': { price: 135 },
            'RAM':         { price: '75-90',      details: '2x16GB DDR5 6000MHz (G.Skill Flare X5)' },
            'GPU':         { price: '499-549',    details: 'RX 9070 16GB | stretch: 9070 XT ~$649' },
            'PSU':         { price: '100-130',    details: '650W Modular (Corsair RM650x)' },
            'Storage':     { price: '300-500 ea', details: '2TB NVMe x2 (⚠️ SSD shortage — prices up ~2x)' }
        }
    };

    // ── DATA PERSISTENCE ────────────────────────────────
    function loadData() {
        const saved = localStorage.getItem('pcPartsData');
        if (!saved) return JSON.parse(JSON.stringify(defaultData));
        const data = JSON.parse(saved);
        if (!data.peripherals) data.peripherals = [];
        ['currentPC', 'newPC', 'peripherals'].forEach(key => {
            (data[key] || []).forEach(part => {
                if (!part.hasOwnProperty('url'))          part.url = '';
                if (!part.hasOwnProperty('notes'))        part.notes = '';
                if (!part.hasOwnProperty('nextBuy'))      part.nextBuy = false;
                if (!part.hasOwnProperty('priceHistory')) part.priceHistory = [];
            });
        });
        return data;
    }

    function saveData(data) {
        localStorage.setItem('pcPartsData', JSON.stringify(data));
        writeToFirebase(data);
        updateStats(data);
    }

    // ── RENDERING ───────────────────────────────────────
    function renderParts() {
        const data = loadData();
        const container = document.getElementById('partsContainer');
        container.innerHTML = '';

        const sorted = key => [...data[key]].sort((a, b) => a.purchased - b.purchased);

        if (isViewMode || isShareMode) {
            container.appendChild(makeSectionCard('Current PC',   sorted('currentPC'),   renderPartsView, false, '#60a5fa'));
            container.appendChild(makeSectionCard('New PC Build', sorted('newPC'),       renderPartsView, false, '#4ade80'));
            container.appendChild(makeSectionCard('Peripherals',  sorted('peripherals'), renderPartsView, true,  '#fb923c'));
        } else {
            container.appendChild(makeSectionCard('Current PC',   sorted('currentPC'),   parts => renderPartsEdit(parts, data.currentPC,   'currentPC'),   false, '#60a5fa'));
            container.appendChild(makeSectionCard('New PC Build', sorted('newPC'),       parts => renderPartsEdit(parts, data.newPC,       'newPC'),       false, '#4ade80'));
            const periphCard = makeSectionCard('Peripherals', sorted('peripherals'), parts => renderPartsEdit(parts, data.peripherals, 'peripherals'), true, '#fb923c');
            const addBtn = document.createElement('button');
            addBtn.className = 'btn btn-primary btn-xs';
            addBtn.textContent = '+ Add';
            addBtn.onclick = addPeripheral;
            periphCard.querySelector('.section-header').appendChild(addBtn);
            container.appendChild(periphCard);
        }

        updateStats(data);
    }

    function makeSectionCard(title, parts, renderFn, fullWidth = false, accent = '#60a5fa') {
        const purchasedCount = parts.filter(p => p.purchased).length;
        const isComplete     = parts.length > 0 && purchasedCount === parts.length;
        const pct            = parts.length ? Math.round(purchasedCount / parts.length * 100) : 0;

        const card = document.createElement('div');
        card.className = 'section-card' + (fullWidth ? ' section-full' : '') + (isComplete ? ' complete' : '');
        card.style.setProperty('--card-accent', accent);

        const badge = `<span class="section-badge">${purchasedCount}/${parts.length}</span>`;
        card.innerHTML = `
            <div class="section-header">
                <span class="section-title">${escHtml(title)} ${badge}</span>
            </div>
            <div class="section-progress">
                <div class="section-progress-fill" style="width:${pct}%"></div>
            </div>
            <div class="section-body" id="body-${title.replace(/\s/g,'_')}"></div>
        `;
        card.querySelector('.section-body').innerHTML = renderFn(parts);
        return card;
    }

    function renderPartsView(parts) {
        if (!parts.length) return '<p class="empty-state">No items yet</p>';
        return parts.map(part => {
            const currentNum = parseFloat(String(part.price).split('-')[0]);
            const origNum    = parseFloat(part.originalPrice);
            const isDeal     = origNum && currentNum && origNum > currentNum;
            const savings    = isDeal ? Math.round(origNum - currentNum) : 0;

            return `
            <div class="part-item ${part.purchased ? 'purchased' : ''}">
                <div class="part-view-row">
                    <div class="part-view-info">
                        <div class="part-view-name">
                            ${part.nextBuy ? '<span class="next-buy-badge">★ Next Buy</span> ' : ''}
                            ${escHtml(part.name)}
                        </div>
                        <div class="part-view-details">${escHtml(part.details)}</div>
                        ${part.url ? `<a href="${escAttr(part.url)}" target="_blank" rel="noopener" class="part-view-link">🔗 View Product</a>` : ''}
                        ${part.purchased ? '<div><span class="purchased-badge">PURCHASED</span></div>' : ''}
                        ${part.notes ? `<div class="notes-view">${escHtml(part.notes)}</div>` : ''}
                    </div>
                    <div class="part-view-price">
                        ${part.price
                            ? `<span class="price-current${isDeal ? ' price-deal' : ''}">$${escHtml(String(part.price))}</span>`
                            : `<span class="price-tbd">TBD</span>`}
                        ${part.originalPrice ? `<span class="price-original">$${escHtml(String(part.originalPrice))}</span>` : ''}
                        ${isDeal ? `<div><span class="price-savings-badge">Save $${savings}</span></div>` : ''}
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    function renderPartsEdit(sortedParts, originalParts, buildType) {
        if (!sortedParts.length && buildType !== 'peripherals') return '<p class="empty-state">No items</p>';
        if (!sortedParts.length) return '';
        return sortedParts.map(part => {
            const idx = originalParts.indexOf(part);

            const historyHTML = (part.priceHistory && part.priceHistory.length)
                ? `<button class="history-toggle" onclick="this.nextElementSibling.classList.toggle('open')">📊 Price history (${part.priceHistory.length})</button>
                   <div class="price-history">${part.priceHistory.slice().reverse().map(h =>
                       `<div class="price-history-entry"><span>${h.date}</span><span>$${escHtml(String(h.price))}</span></div>`
                   ).join('')}</div>`
                : '';

            const removeBtn = buildType === 'peripherals'
                ? `<button class="btn btn-danger btn-xs" style="margin-top:10px" onclick="removePeripheral(${idx})">Remove</button>`
                : '';

            return `
            <div class="part-item ${part.purchased ? 'purchased' : ''}">
                <div class="part-header">
                    <button class="next-buy-star ${part.nextBuy ? 'active' : ''}" title="Mark as next to buy"
                            onclick="toggleNextBuy('${buildType}', ${idx})">★</button>
                    <input type="text" class="part-name-input" value="${escAttr(part.name)}"
                           onchange="updatePart('${buildType}', ${idx}, 'name', this.value)">
                    <button class="purchased-toggle ${part.purchased ? 'active' : ''}"
                            onclick="togglePurchased('${buildType}', ${idx})">
                        ${part.purchased ? '✓ Purchased' : 'Not Purchased'}
                    </button>
                </div>
                <div>
                    <input type="text" value="${escAttr(part.details)}" placeholder="Component details"
                           onchange="updatePart('${buildType}', ${idx}, 'details', this.value)">
                </div>
                <div class="url-field">
                    <label class="field-label">Product Link</label>
                    <input type="text" value="${escAttr(part.url || '')}" placeholder="https://..."
                           onchange="updatePart('${buildType}', ${idx}, 'url', this.value)">
                </div>
                <div class="price-inputs">
                    <div class="price-group">
                        <label class="field-label">Current Price</label>
                        <input type="text" value="${escAttr(String(part.price ?? ''))}" placeholder="TBD"
                               onchange="updatePart('${buildType}', ${idx}, 'price', this.value)">
                    </div>
                    <div class="price-group">
                        <label class="field-label">Original Price</label>
                        <input type="text" value="${escAttr(String(part.originalPrice ?? ''))}" placeholder="Optional"
                               onchange="updatePart('${buildType}', ${idx}, 'originalPrice', this.value)">
                    </div>
                </div>
                ${historyHTML}
                <button class="notes-toggle" onclick="this.nextElementSibling.classList.toggle('open')">
                    📝 Notes${part.notes ? ' (1)' : ''}
                </button>
                <div class="notes-area${part.notes ? ' open' : ''}">
                    <textarea placeholder="Add notes, links, comparisons…"
                              onchange="updatePart('${buildType}', ${idx}, 'notes', this.value)">${escHtml(part.notes || '')}</textarea>
                </div>
                ${removeBtn}
            </div>`;
        }).join('');
    }

    // ── ACTIONS ─────────────────────────────────────────
    function updatePart(buildType, index, field, value) {
        const data = loadData();
        if (field === 'price' || field === 'originalPrice') {
            const newVal = value.trim() === '' ? null : value.trim();
            if (field === 'price' && newVal !== String(data[buildType][index].price ?? '')) {
                if (!data[buildType][index].priceHistory) data[buildType][index].priceHistory = [];
                if (newVal) {
                    data[buildType][index].priceHistory.push({
                        price: newVal,
                        date:  new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
                    });
                }
            }
            data[buildType][index][field] = newVal;
        } else {
            data[buildType][index][field] = value;
        }
        saveData(data);
        showToast('Saved');
    }

    function togglePurchased(buildType, index) {
        const data = loadData();
        data[buildType][index].purchased = !data[buildType][index].purchased;
        saveData(data);
        renderParts();
    }

    function toggleNextBuy(buildType, index) {
        const data = loadData();
        data[buildType][index].nextBuy = !data[buildType][index].nextBuy;
        saveData(data);
        renderParts();
    }

    function addPeripheral() {
        const data = loadData();
        data.peripherals.push({ name: 'New Peripheral', details: 'Description', price: null, originalPrice: null, purchased: false, url: '', notes: '', nextBuy: false, priceHistory: [] });
        saveData(data);
        renderParts();
    }

    function removePeripheral(index) {
        if (!confirm('Remove this peripheral?')) return;
        const data = loadData();
        data.peripherals.splice(index, 1);
        saveData(data);
        renderParts();
    }

    function resetToDefaults() {
        if (!confirm('Reset all data to defaults? This cannot be undone.')) return;
        localStorage.removeItem('pcPartsData');
        localStorage.removeItem('monthlyBudget');
        if (FIREBASE_ENABLED && dataRef) dataRef.remove();
        const budgetInput = document.getElementById('monthlyBudgetInput');
        if (budgetInput) budgetInput.value = '';
        updateMonthlyBudget('', false);
        renderParts();
        showToast('Reset to defaults');
    }

    function toggleMode() {
        isViewMode = !isViewMode;
        document.getElementById('modeToggle').textContent = isViewMode ? 'Edit Mode' : 'View Mode';
        document.getElementById('modePill').textContent = isViewMode
            ? '👁 View Mode — read-only with clickable product links'
            : '✏️ Edit Mode — click fields to edit, changes auto-save';
        renderParts();
    }

    // ── STATS ───────────────────────────────────────────
    function animateStat(id, newVal) {
        const el = document.getElementById(id);
        if (!el) return;
        const changed = el.textContent !== newVal;
        el.textContent = newVal;
        if (changed) {
            el.classList.remove('stat-pop');
            void el.offsetWidth;
            el.classList.add('stat-pop');
        }
    }

    function updateStats(data) {
        let spent = 0, remaining = 0, savings = 0, purchased = 0, total = 0;
        [...data.currentPC, ...data.newPC, ...data.peripherals].forEach(part => {
            total++;
            const price = parseFloat(String(part.price).split('-')[0]) || 0;
            const orig  = parseFloat(part.originalPrice) || 0;
            if (part.purchased) {
                purchased++;
                if (price) { spent += price; if (orig) savings += orig - price; }
            } else if (price) {
                remaining += price;
            }
        });
        animateStat('itemsCount',     `${purchased}/${total}`);
        animateStat('totalSpent',     `$${Math.round(spent)}`);
        animateStat('totalRemaining', `$${Math.round(remaining)}`);
        animateStat('totalSavings',   `$${Math.round(savings)}`);

        const budgetInput = document.getElementById('monthlyBudgetInput');
        if (budgetInput && budgetInput.value) updateMonthlyBudget(budgetInput.value, false);
    }

    // ── BUDGET TRACKER ──────────────────────────────────
    function updateMonthlyBudget(val, persist = true) {
        if (persist) localStorage.setItem('monthlyBudget', val);
        const el = document.getElementById('budgetEstimate');
        if (!el) return;
        const budget = parseFloat(val);
        if (!budget || budget <= 0) {
            el.textContent = 'Set a budget to see estimated completion';
            el.classList.remove('active');
            return;
        }
        const data = loadData();
        let remaining = 0;
        [...data.currentPC, ...data.newPC, ...data.peripherals].forEach(part => {
            if (!part.purchased) remaining += parseFloat(String(part.price).split('-')[0]) || 0;
        });
        if (remaining <= 0) {
            el.textContent = '🎉 All items purchased!';
            el.classList.add('active');
            return;
        }
        const months  = Math.ceil(remaining / budget);
        const finish  = new Date();
        finish.setMonth(finish.getMonth() + months);
        el.textContent = `~${months} month${months !== 1 ? 's' : ''} to complete (${finish.toLocaleDateString('en-US', { month: 'short', year: 'numeric' })})`;
        el.classList.add('active');
    }

    // ── SHARE LINK ──────────────────────────────────────
    function generateShareLink() {
        const url = location.origin + location.pathname + '?share=1';
        navigator.clipboard.writeText(url).then(() => {
            showToast('🔗 Share link copied — anyone with it can view your build');
        }).catch(() => {
            prompt('Copy this share link:', url);
        });
    }

    // ── SYNC / IMPORT / EXPORT ──────────────────────────
    function toggleSync() {
        const panel = document.getElementById('syncPanel');
        panel.classList.toggle('open');
        if (panel.classList.contains('open')) renderSyncPanel();
    }

    function renderSyncPanel() {
        const panel = document.getElementById('syncPanel');
        if (!panel.classList.contains('open')) return;

        const dot    = document.getElementById('connDot');
        const online = dot && dot.classList.contains('online');

        if (FIREBASE_ENABLED) {
            panel.className = 'sync-panel open' + (online ? ' firebase-live' : '');
            panel.innerHTML = `
                <div class="sync-panel-title">${online ? '🟢 Live Sync Active' : '🟡 Connecting…'}</div>
                <p>${online
                    ? 'Firebase Realtime Database is connected. Every change you make here appears instantly on all your other devices.'
                    : 'Firebase is configured — waiting for connection. Changes are saved locally until the connection is restored.'
                }</p>
                <div class="sync-actions">
                    <button class="btn btn-primary btn-sm"    onclick="applyPriceUpdates()">🔄 Update Prices &amp; GPU</button>
                    <button class="btn btn-secondary btn-sm"  onclick="generateShareLink()">🔗 Share Build</button>
                    <button class="btn btn-secondary btn-sm"  onclick="pushToCloud()">☁️ Push This Device → Cloud</button>
                    <button class="btn btn-secondary btn-sm"  onclick="exportToFile()">💾 Download JSON</button>
                    <button class="btn btn-secondary btn-sm"  onclick="document.getElementById('importFile').click()">📁 Import JSON</button>
                </div>
                <p class="sync-note">
                    <strong>Update Prices &amp; GPU</strong> — applies latest researched prices and keeps your purchased states &amp; URLs intact.<br><br>
                    <strong>Share Build</strong> — copies a read-only link anyone can open to view your tracker.<br><br>
                    <strong>Push This Device → Cloud</strong> — forces your local data to all other devices.
                </p>
            `;
        } else {
            panel.className = 'sync-panel open';
            panel.innerHTML = `
                <div class="sync-panel-title">⇄ Enable Live Sync</div>
                <p>Add your Firebase config to the top of <code>index.html</code> to get always-on, real-time sync across all devices.</p>
                <div class="sync-code">1. console.firebase.google.com → New project
2. Add a Web App → copy the firebaseConfig object
3. Build → Realtime Database → Create database (test mode)
4. Paste the config values into FIREBASE_CONFIG in index.html
5. Redeploy to Vercel → done</div>
                <div class="sync-actions">
                    <button class="btn btn-primary btn-sm"   onclick="exportShareLink()">📋 Copy Sync Link (manual)</button>
                    <button class="btn btn-secondary btn-sm" onclick="exportToFile()">💾 Download JSON</button>
                    <button class="btn btn-secondary btn-sm" onclick="document.getElementById('importFile').click()">📁 Import JSON</button>
                </div>
                <p class="sync-note">Without Firebase, use the sync link or JSON export to move data between devices.</p>
            `;
        }
    }

    function applyPriceUpdates() {
        if (!confirm('Apply latest researched prices and GPU update? Purchased status, URLs, and part names are preserved.')) return;
        const data = loadData();
        ['currentPC', 'newPC'].forEach(section => {
            if (!LATEST_PRICES[section]) return;
            data[section].forEach(part => {
                const update = LATEST_PRICES[section][part.name];
                if (update) Object.assign(part, update);
            });
        });
        saveData(data);
        renderParts();
        showToast('✅ Prices & GPU updated — pushing to cloud…');
        if (FIREBASE_ENABLED && dataRef) {
            dataRef.set(data).then(() => showToast('☁️ All devices updated'));
        }
    }

    function pushToCloud() {
        if (!FIREBASE_ENABLED || !dataRef) return;
        const data = loadData();
        dataRef.set(data)
            .then(() => showToast('☁️ Pushed to cloud — all devices will update'))
            .catch(() => showToast('❌ Push failed — check connection'));
    }

    function exportShareLink() {
        const data = loadData();
        const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
        const url = location.origin + location.pathname + '#sync=' + encoded;
        navigator.clipboard.writeText(url).then(() => {
            showToast('📋 Sync link copied! Open it on your other device.');
        }).catch(() => {
            prompt('Copy this sync link:', url);
        });
    }

    function exportToFile() {
        const data = loadData();
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'pc-tracker-data.json';
        a.click();
        URL.revokeObjectURL(a.href);
        showToast('💾 Data exported');
    }

    function handleImportFile(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            try {
                const data = JSON.parse(e.target.result);
                if (!data.currentPC || !data.newPC) throw new Error('Invalid format');
                if (!confirm('Import this data? Your current data will be replaced.')) return;
                localStorage.setItem('pcPartsData', JSON.stringify(data));
                renderParts();
                showToast('✅ Data imported successfully');
            } catch {
                showToast('❌ Import failed — invalid file');
            }
        };
        reader.readAsText(file);
        event.target.value = '';
    }

    function loadFromHash() {
        const hash = location.hash;
        if (!hash.startsWith('#sync=')) return;
        try {
            const encoded = hash.slice(6);
            const data = JSON.parse(decodeURIComponent(escape(atob(encoded))));
            if (!data.currentPC || !data.newPC) throw new Error();
            if (confirm('Sync data detected! Load it? (Replaces your current local data)')) {
                localStorage.setItem('pcPartsData', JSON.stringify(data));
                showToast('✅ Data synced from link');
            }
        } catch {
            showToast('❌ Sync link was invalid');
        }
        history.replaceState(null, '', location.pathname);
    }

    // ── TOAST ───────────────────────────────────────────
    let toastTimer;
    function showToast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
    }

    // ── HELPERS ─────────────────────────────────────────
    function escHtml(str) {
        return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function escAttr(str) { return escHtml(str); }

    // ── BOOT ────────────────────────────────────────────
    if (isShareMode) {
        document.getElementById('shareBanner').style.display = 'block';
        document.getElementById('modeToggle').style.display  = 'none';
    }

    const _savedBudget = localStorage.getItem('monthlyBudget');
    if (_savedBudget) {
        const _budgetInput = document.getElementById('monthlyBudgetInput');
        if (_budgetInput) _budgetInput.value = _savedBudget;
    }

    setConnected(false);
    loadFromHash();
    renderParts();

    if (_savedBudget) updateMonthlyBudget(_savedBudget, false);
</script>
</body>
</html>
